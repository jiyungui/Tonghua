<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="星星机" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#dfdfdd" />
    <title>星星机</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/phone.css" />
    <link rel="stylesheet" href="css/widgets.css" />
    <link rel="stylesheet" href="css/apps.css" />
    <link rel="stylesheet" href="css/dock.css" />
    <link rel="stylesheet" href="css/modal.css" />
</head>

<body>

    <!-- 手机外壳 -->
    <div class="phone-shell" id="phoneShell">

        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="status-time" id="statusTime">00:00</span>
            <div class="status-right">
                <span class="status-signal">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="currentColor" />
                        <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5" fill="currentColor" />
                        <rect x="9" y="2" width="3" height="10" rx="0.5" fill="currentColor" />
                        <rect x="13.5" y="0" width="2.5" height="12" rx="0.5" fill="currentColor" opacity="0.3" />
                    </svg>
                </span>
                <span class="status-network">5G</span>
                <span class="status-battery">
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none">
                        <rect x="0.5" y="0.5" width="18" height="11" rx="2.5" stroke="currentColor" stroke-width="1" />
                        <rect x="2" y="2" width="13" height="8" rx="1.5" fill="currentColor" id="batteryFill" />
                        <path d="M19.5 4v4a2 2 0 0 0 0-4z" fill="currentColor" opacity="0.4" />
                    </svg>
                </span>
            </div>
        </div>

        <!-- 灵动岛 -->
        <div class="dynamic-island"></div>

        <!-- 主屏幕内容区 -->
        <div class="home-screen" id="homeScreen">

            <!-- ① 顶部信息小组件 -->
            <div class="widget-info glass-widget" id="widgetInfo">
                <div class="widget-info-top">
                    <div class="info-avatar" id="infoAvatar" title="点击更换头像">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="10" r="5" stroke="#999" stroke-width="1.2" />
                            <path d="M4 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#999" stroke-width="1.2"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <div class="info-motto-wrap">
                        <input class="info-motto" id="infoMotto" type="text" placeholder="幸好爱是小小的奇迹" maxlength="20" />
                    </div>
                    <div class="info-icon">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="7" cy="7" r="3" stroke="#bbb" stroke-width="1.2" />
                            <circle cx="13" cy="13" r="3" stroke="#bbb" stroke-width="1.2" />
                            <circle cx="13" cy="7" r="3" stroke="#bbb" stroke-width="1.2" />
                        </svg>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-label">Baby</span>
                    <input class="info-input" id="infoBaby" type="text" placeholder="call Aero" maxlength="16" />
                </div>
                <div class="info-row">
                    <span class="info-label">Contact</span>
                    <input class="info-input" id="infoContact" type="text" placeholder="http//>Aero's love.com"
                        maxlength="32" />
                </div>
            </div>

            <!-- ② 双小组件行 -->
            <div class="widgets-row">

                <!-- 左侧：图片 + 斜体标题（带回形针） -->
                <div class="widget-square widget-left glass-widget" id="widgetLeft">
                    <div class="widget-clip" aria-hidden="true">
                        <svg width="14" height="20" viewBox="0 0 14 20" fill="none">
                            <path d="M7 1v14M7 15c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a5 5 0 0 1 10 0v9" stroke="#aaa"
                                stroke-width="1.3" stroke-linecap="round" />
                        </svg>
                    </div>
                    <div class="widget-img-wrap" id="widgetLeftImgWrap">
                        <input type="file" accept="image/*" id="widgetLeftFile" class="file-input" />
                        <label for="widgetLeftFile" class="img-placeholder" id="widgetLeftPlaceholder">
                            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                                <rect x="2" y="4" width="24" height="18" rx="2.5" stroke="#bbb" stroke-width="1.3" />
                                <circle cx="9" cy="11" r="2.5" stroke="#bbb" stroke-width="1.3" />
                                <path d="M2 18l6-5 5 5 4-3 9 5" stroke="#bbb" stroke-width="1.3"
                                    stroke-linejoin="round" />
                            </svg>
                            <span>点击添加图片</span>
                        </label>
                    </div>
                    <div class="widget-caption-wrap">
                        <input class="widget-caption" id="widgetLeftCaption" type="text" placeholder="First Choice"
                            maxlength="16" />
                    </div>
                </div>

                <!-- 右侧：纯图片框（虚线边） -->
                <div class="widget-square widget-right glass-widget" id="widgetRight">
                    <div class="widget-img-wrap" id="widgetRightImgWrap">
                        <input type="file" accept="image/*" id="widgetRightFile" class="file-input" />
                        <label for="widgetRightFile" class="img-placeholder" id="widgetRightPlaceholder">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <rect x="2" y="3" width="20" height="16" rx="2.5" stroke="#bbb" stroke-width="1.3" />
                                <circle cx="8" cy="9" r="2" stroke="#bbb" stroke-width="1.3" />
                                <path d="M2 15l5-4 4 4 3-2.5 8 4.5" stroke="#bbb" stroke-width="1.3"
                                    stroke-linejoin="round" />
                            </svg>
                            <span>点击添加图片</span>
                        </label>
                    </div>
                </div>

            </div>

            <!-- ③ 分页指示点 -->
            <div class="page-dots">
                <span class="dot active"></span>
            </div>

            <!-- ④ APP 网格：心声 / 论坛 / 小芽日记 / 街の声 / 糖果铺 / 音乐 -->
            <!--    聊天、世界书、设置已在 Dock，此处不重复                 -->
            <div class="apps-grid" id="appsGrid">

                <!-- 心声 -->
                <div class="app-item" data-app="voice">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <path d="M15 5v20M10 9v12M5 12v6M20 9v12M25 12v6" stroke="#555" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <span class="app-label">心声</span>
                </div>

                <!-- 论坛 -->
                <div class="app-item" data-app="forum">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <rect x="4" y="7" width="14" height="10" rx="2" stroke="#555" stroke-width="1.4" />
                            <path d="M8 17v3l4-3" stroke="#555" stroke-width="1.4" stroke-linejoin="round" />
                            <path d="M14 12h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H18l-4 3v-3h-2" stroke="#555"
                                stroke-width="1.4" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <span class="app-label">论坛</span>
                </div>

                <!-- 小芽日记 -->
                <div class="app-item" data-app="diary">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <rect x="7" y="4" width="16" height="22" rx="2" stroke="#555" stroke-width="1.4" />
                            <line x1="11" y1="10" x2="19" y2="10" stroke="#555" stroke-width="1.3"
                                stroke-linecap="round" />
                            <line x1="11" y1="14" x2="19" y2="14" stroke="#555" stroke-width="1.3"
                                stroke-linecap="round" />
                            <line x1="11" y1="18" x2="15" y2="18" stroke="#555" stroke-width="1.3"
                                stroke-linecap="round" />
                            <circle cx="20" cy="23" r="5" fill="white" stroke="#555" stroke-width="1.2" />
                            <path d="M18 23l1.5 1.5L22.5 21" stroke="#555" stroke-width="1.2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <span class="app-label">小芽日记</span>
                </div>

                <!-- 街の声 -->
                <div class="app-item" data-app="street">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <path d="M5 25l5-14h10l5 14" stroke="#555" stroke-width="1.4" stroke-linejoin="round" />
                            <path d="M10 25V14" stroke="#555" stroke-width="1.2" stroke-dasharray="2 2" />
                            <path d="M20 25V14" stroke="#555" stroke-width="1.2" stroke-dasharray="2 2" />
                            <line x1="5" y1="25" x2="25" y2="25" stroke="#555" stroke-width="1.4"
                                stroke-linecap="round" />
                            <rect x="12" y="17" width="6" height="8" rx="1" stroke="#555" stroke-width="1.2" />
                            <rect x="7" y="17" width="4" height="4" rx="0.8" stroke="#555" stroke-width="1.1" />
                            <rect x="19" y="17" width="4" height="4" rx="0.8" stroke="#555" stroke-width="1.1" />
                            <path d="M9 8c0-3 6-3 6 0s6 0 6-3" stroke="#555" stroke-width="1.2"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <span class="app-label">街の声</span>
                </div>

                <!-- 糖果铺 -->
                <div class="app-item" data-app="candy">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <circle cx="15" cy="16" r="8" stroke="#555" stroke-width="1.4" />
                            <path d="M15 8V5M12 6l3-3 3 3" stroke="#555" stroke-width="1.3" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M11 14c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="#555" stroke-width="1.3"
                                stroke-linecap="round" />
                            <circle cx="12.5" cy="17" r="1" fill="#555" />
                            <circle cx="17.5" cy="17" r="1" fill="#555" />
                            <path d="M12 20c.8 1 4.2 1 6 0" stroke="#555" stroke-width="1.2" stroke-linecap="round" />
                        </svg>
                    </div>
                    <span class="app-label">糖果铺</span>
                </div>

                <!-- 音乐 -->
                <div class="app-item" data-app="music">
                    <div class="app-icon glass-icon">
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                            <path d="M12 22V10l13-3v12" stroke="#555" stroke-width="1.4" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <circle cx="10" cy="22" r="3" stroke="#555" stroke-width="1.4" />
                            <circle cx="23" cy="19" r="3" stroke="#555" stroke-width="1.4" />
                        </svg>
                    </div>
                    <span class="app-label">音乐</span>
                </div>

            </div>
            <!-- /apps-grid -->

        </div>
        <!-- /home-screen -->

        <!-- Dock 栏：聊天 / 世界书 / 设置 -->
        <div class="dock-bar">
            <div class="dock-inner glass-dock">

                <!-- 聊天 -->
                <div class="dock-item" data-app="chat">
                    <div class="dock-icon">
                        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
                            <path d="M5 6h20a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H9l-5 4V8a2 2 0 0 1 2-2z" stroke="#444"
                                stroke-width="1.5" stroke-linejoin="round" />
                            <circle cx="10" cy="13" r="1.2" fill="#444" />
                            <circle cx="15" cy="13" r="1.2" fill="#444" />
                            <circle cx="20" cy="13" r="1.2" fill="#444" />
                        </svg>
                    </div>
                    <span class="dock-label">聊天</span>
                </div>

                <!-- 世界书 -->
                <div class="dock-item" data-app="worldbook">
                    <div class="dock-icon">
                        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
                            <circle cx="15" cy="15" r="10" stroke="#444" stroke-width="1.5" />
                            <ellipse cx="15" cy="15" rx="4.5" ry="10" stroke="#444" stroke-width="1.5" />
                            <line x1="5" y1="15" x2="25" y2="15" stroke="#444" stroke-width="1.5" />
                            <line x1="6.5" y1="10" x2="23.5" y2="10" stroke="#444" stroke-width="1" />
                            <line x1="6.5" y1="20" x2="23.5" y2="20" stroke="#444" stroke-width="1" />
                        </svg>
                    </div>
                    <span class="dock-label">世界书</span>
                </div>

                <!-- 设置 -->
                <div class="dock-item" data-app="settings">
                    <div class="dock-icon">
                        <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
                            <circle cx="15" cy="15" r="3.5" stroke="#444" stroke-width="1.4" />
                            <path d="M15 4v3M15 23v3M4 15h3M23 15h3
                       M7.05 7.05l2.12 2.12M20.83 20.83l2.12 2.12
                       M7.05 22.95l2.12-2.12M20.83 9.17l2.12-2.12" stroke="#444" stroke-width="1.4"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <span class="dock-label">设置</span>
                </div>

            </div>
            <div class="home-indicator"></div>
        </div>

    </div>
    <!-- /phone-shell -->

    <!-- 未开发弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card glass-modal">
            <div class="modal-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="16" stroke="#888" stroke-width="1.5" />
                    <path d="M18 11v8M18 22v2" stroke="#888" stroke-width="1.8" stroke-linecap="round" />
                </svg>
            </div>
            <h3 class="modal-title" id="modalTitle">该模块开发中</h3>
            <p class="modal-desc">星星机 · 此功能正在建设中<br />敬请期待</p>
            <button class="modal-close" id="modalClose">知道了</button>
        </div>
    </div>

    <!-- 壁纸更换按钮 -->
    <div class="wallpaper-btn" id="wallpaperBtn" title="更换壁纸">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="3" width="16" height="13" rx="2" stroke="#888" stroke-width="1.3" />
            <circle cx="7" cy="8" r="1.8" stroke="#888" stroke-width="1.2" />
            <path d="M2 13l4-4 3 3 3-2.5 6 4" stroke="#888" stroke-width="1.2" stroke-linejoin="round" />
        </svg>
    </div>
    <input type="file" accept="image/*" id="wallpaperFile" style="display:none" />

    <script src="js/storage.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
